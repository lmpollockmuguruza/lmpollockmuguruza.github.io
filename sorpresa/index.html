<style>

    color: var(--text-deep);

    font-weight: 300;

    cursor: none;

    background: var(--terracotta);

    height: 16px;
    background: var(--blush);
  }

  #bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    transition: background 0.9s ease;

  #ghost {
    position: fixed;

    font-weight: 300;
    color: transparent;

    pointer-events: none;
    z-index: 1;
    transition: opacity 1s ease;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    user-select: none;

    position: fixed;
    inset: 0;

    flex-direction: column;

// ── TIME-AWARE GREETING ──────────────────────────────────────────────────────
function timeGreeting() {
  const now = new Date();
  const h = now.getHours();
  const min = String(now.getMinutes()).padStart(2, '0');
  const timeStr = `${h}:${min}`;
  if (h >= 0  && h < 6)  return `son las ${timeStr} de la madrugada, y no me lo podía perder`;
  if (h >= 6  && h < 12) return `son las ${timeStr} de la mañana, y no me lo podía perder`;
  if (h >= 12 && h < 14) return `son las ${timeStr} del mediodía, y no me lo podía perder`;
  if (h >= 14 && h < 20) return `son las ${timeStr} de la tarde, y no me lo podía perder`;
  return `son las ${timeStr} de la noche, y no me lo podía perder`;
}

// ── CLICK SOUND — soft paper / archive thud ──────────────────────────────────
let audioCtx = null;
function playClick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const t = audioCtx.currentTime;

    // 1. soft low thud — like a book gently placed
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(110, t);
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.18);
    oscGain.gain.setValueAtTime(0.055, t);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    osc.connect(oscGain);
    oscGain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.22);

    // 2. whisper of noise — like paper catching air
    const bufSize = audioCtx.sampleRate * 0.08;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 340;
    bp.Q.value = 0.6;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(0.032, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    noise.connect(bp); bp.connect(noiseGain); noiseGain.connect(audioCtx.destination);
    noise.start(t); noise.stop(t + 0.09);
  } catch(e) {}
}

// ── CONFETTI BURST — small, minimal, one-time on feliz cumpleaños ─────────────
function launchConfetti() {
  const container = document.getElementById('particles');
  // tiny squares and circles, muted palette — not party-store
  const colors = ['#E8A898','#C4622D','#C9965A','#D4B896','#A07860'];
  const count = 28;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const size = 3 + Math.random() * 4;
    const isSquare = Math.random() > 0.5;
    const x = 20 + Math.random() * 60; // keep it central
    const rise = -(80 + Math.random() * 180);
    const drift = (Math.random() - 0.5) * 120;
    const dur = 1.4 + Math.random() * 1.2;
    const delay = Math.random() * 0.6;
    const rotate = Math.random() * 360;
    p.style.cssText = `
      position:absolute;
      width:${size}px; height:${size}px;
      left:${x}%;
      bottom:30%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${isSquare ? '1px' : '50%'};
      opacity:0;
      animation: confettiFly ${dur}s ease-out ${delay}s forwards;
      --drift:${drift}px;
      --rise:${rise}px;
      --rotate:${rotate}deg;
    `;
    container.appendChild(p);
  }
  setTimeout(() => {
    // only remove confetti elements, not ember particles
    Array.from(container.children).forEach(c => {
      if (c.style.animation && c.style.animation.includes('confettiFly')) c.remove();
    });
  }, 4000);
}
function launchParticles() {
  const container = document.getElementById('particles');
  const colors = ['#E8A898','#C4622D','#C9965A','#D4B896','#F2C9B8'];
  const count = 44;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    const x = 5 + Math.random() * 90;
    const rise = -(180 + Math.random() * 520);
    const dur = 6 + Math.random() * 6;
    const delay = Math.random() * 5;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${x}%;
      bottom:${-size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --rise:${rise}px;
      --dur:${dur}s;
      --delay:${delay}s;
    `;
    container.appendChild(p);
  }
  // cleanup after 18s
  setTimeout(() => { container.innerHTML = ''; }, 18000);
}

const hintEl  = document.getElementById('hint');
const dotsEl  = document.getElementById('dots');
const cursorEl= document.getElementById('cursor');
const backEl  = document.getElementById('back');

let current = 0;
let busy = false;

// dots
const CHAPTERS = 9;
for (let i = 0; i < CHAPTERS; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  dotsEl.appendChild(d);
}

function chapterOf(i) { return Math.min(Math.floor((i / beats.length) * CHAPTERS), CHAPTERS - 1); }
function updateDots(i) {
  document.querySelectorAll('.dot').forEach((d, idx) => {
    d.classList.toggle('active', idx === chapterOf(i));
  });
}

function apply(beat) {
  bgEl.style.background = beat.bg;
  ghostEl.style.opacity = beat.ghost ? '0.18' : '0';
  if (beat.mode === 'replace') {
    stage.innerHTML = beat.html;
  } else if (beat.mode === 'add') {
    stage.insertAdjacentHTML('beforeend', beat.html);
  } else if (beat.mode === 'tag') {
    const container = document.getElementById('tags');
    if (container) container.insertAdjacentHTML('beforeend', beat.html);
  }
  if (beat.particles) setTimeout(launchParticles, 400);
  if (beat.confetti) setTimeout(launchConfetti, 200);
}

function updateBack() {
  backEl.classList.toggle('visible', current > 1);
}

function replayFrom(idx) {
  // find the nearest replace at or before idx
  let start = idx;
  while (start > 0 && beats[start].mode !== 'replace') start--;
  // replay from that replace beat up to idx (inclusive)
  stage.innerHTML = '';
  for (let i = start; i <= idx; i++) {
    const b = beats[i];
    bgEl.style.background = b.bg;
    ghostEl.style.opacity = b.ghost ? '0.18' : '0';
    if (b.mode === 'replace')      stage.innerHTML = b.html;
    else if (b.mode === 'add')     stage.insertAdjacentHTML('beforeend', b.html);
    else if (b.mode === 'tag') {
      const c = document.getElementById('tags');
      if (c) c.insertAdjacentHTML('beforeend', b.html);
    }
  }
}

function goBack() {
  if (busy || current <= 1) return;
  playClick();
  current -= 2; // step back two: one for the beat we're on, one more
  if (current < 0) current = 0;

  busy = true;
  Array.from(stage.children).forEach(c => c.classList.add('leaving'));
  setTimeout(() => {
    replayFrom(current);
    current++;
    updateDots(current - 1);
    updateBack();
    busy = false;
  }, 320);
}

function advance() {
  if (busy || current >= beats.length) return;

  playClick();
  hintEl.style.opacity = '0';

  const beat = beats[current];

  if (beat.mode === 'replace' && stage.children.length > 0) {
    busy = true;
    Array.from(stage.children).forEach(c => c.classList.add('leaving'));
    setTimeout(() => { apply(beat); busy = false; updateBack(); }, 320);
  } else {
    apply(beat);
    updateBack();
  }

  updateDots(current);
  current++;
}

// boot
window.addEventListener('load', () => {
  apply(beats[0]);
  updateDots(0);
  current = 1;
  setTimeout(() => { hintEl.style.opacity = '0.6'; }, 1800);
});

// input
document.addEventListener('click', advance);
document.addEventListener('keydown', e => {
  if ([' ','ArrowRight','Enter'].includes(e.key)) { e.preventDefault(); advance(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
});
document.addEventListener('touchend', e => { e.preventDefault(); advance(); }, { passive:false });
backEl.addEventListener('click', e => { e.stopPropagation(); goBack(); });
backEl.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); goBack(); });

// cursor
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursorEl.classList.add('clicking'));
document.addEventListener('mouseup',   () => cursorEl.classList.remove('clicking'));
</script>
</body>
</html>
